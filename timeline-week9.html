<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Approach — Weeks 9–10</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffffff;
    color: #140F50;
    padding: 1.25rem 1rem 2rem;
  }

  .tl-hint {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: #9884FF;
    margin-bottom: 0.85rem;
    user-select: none;
  }

  .tl-track {
    display: flex;
    align-items: flex-start;
    overflow-x: auto;
    padding: 0.5rem 0.25rem 1.75rem;
    gap: 0;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #C1B5FF #E6E1FF;
  }
  .tl-track::-webkit-scrollbar { height: 5px; }
  .tl-track::-webkit-scrollbar-track { background: #E6E1FF; border-radius: 3px; }
  .tl-track::-webkit-scrollbar-thumb { background: #C1B5FF; border-radius: 3px; }

  .tl-connector {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 5px;
    margin-top: calc(24px + 5.5rem - 15px);
  }
  .tl-connector svg path {
    transition: stroke 0.4s ease, stroke-width 0.35s ease, opacity 0.4s ease;
  }
  .tl-connector.tl-adj svg path {
    stroke: #9884FF;
    stroke-width: 2.4;
    opacity: 1;
  }
  .tl-connector.tl-adj {
    animation: tlArrowPulse 1.8s ease-in-out infinite;
  }

  .tl-step-wrap { flex-shrink: 0; }

  .tl-card {
    width: 218px;
    background: #ffffff;
    border: 1.5px solid #d8dbe8;
    border-radius: 12px;
    cursor: pointer;
    outline: none;
    text-align: left;
    overflow: hidden;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, transform 0.22s ease;
  }
  .tl-card:hover {
    border-color: #9884FF;
    box-shadow: 0 4px 18px rgba(131,107,255,0.15);
    transform: translateY(-2px);
  }
  .tl-card:focus-visible {
    border-color: #836BFF;
    box-shadow: 0 0 0 3px rgba(131,107,255,0.25);
  }
  .tl-card[aria-expanded="true"] {
    border-color: #836BFF;
    background: #E6E1FF;
    box-shadow: 0 6px 24px rgba(131,107,255,0.2);
    transform: translateY(-3px);
  }

  /* Current stage */
  .tl-card.tl-current {
    border: 2px solid #1448FF;
    background: #D0DAFF;
    box-shadow: 0 4px 20px rgba(20,72,255,0.18);
  }
  .tl-card.tl-current:hover {
    box-shadow: 0 6px 28px rgba(20,72,255,0.28);
    transform: translateY(-3px);
  }
  .tl-card.tl-current[aria-expanded="true"] {
    border-color: #1448FF;
    background: #D0DAFF;
    box-shadow: 0 6px 28px rgba(20,72,255,0.25);
  }
  .tl-card.tl-glow { animation: tlGlow 0.55s ease forwards; }

  /* Badge */
  .tl-week-badge {
    color: #fff;
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    white-space: nowrap;
    background: #836BFF;
  }
  .tl-card.tl-current .tl-week-badge {
    background: linear-gradient(135deg, #1448FF 0%, #0F3AE0 100%);
  }

  /* Card body — fixed height keeps all collapsed cards equal */
  .tl-card-body {
    height: 12rem;
    display: flex;
    flex-direction: column;
    padding: 1.1rem 1rem 0;
    overflow: hidden;
  }

  .tl-card-top {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    margin-bottom: 0.6rem;
  }

  .tl-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px; min-width: 24px;
    border-radius: 50%;
    background: #836BFF;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    line-height: 1;
    transition: background 0.25s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tl-card.tl-current .tl-num { background: #1448FF; }
  .tl-card[aria-expanded="true"] .tl-num { background: #140F50; transform: scale(1.2); }

  .tl-icon {
    font-size: 1.2rem; line-height: 1; display: inline-block;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tl-card[aria-expanded="true"] .tl-icon { transform: scale(1.15) rotate(-5deg); }

  .tl-title {
    font-family: 'Georgia', serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: #140F50;
    margin: 0 0 0.38rem;
    line-height: 1.35;
    transition: color 0.25s ease;
  }
  .tl-card[aria-expanded="true"] .tl-title { color: #836BFF; }
  .tl-card.tl-current[aria-expanded="true"] .tl-title { color: #1448FF; }

  .tl-desc {
    font-size: 0.79rem;
    color: #3B376D;
    line-height: 1.55;
    margin: 0;
    flex: 1;
    overflow: hidden;
  }

  .tl-toggle-hint {
    font-size: 0.73rem;
    color: #9884FF;
    display: flex;
    align-items: center;
    gap: 0.28rem;
    transition: color 0.25s ease;
    padding: 0.55rem 0 0.85rem;
    margin-top: auto;
    white-space: nowrap;
    overflow: hidden;
  }
  .tl-card:hover .tl-toggle-hint,
  .tl-card[aria-expanded="true"] .tl-toggle-hint { color: #836BFF; }
  .tl-card.tl-current .tl-toggle-hint { color: #1448FF; }
  .tl-card.tl-current[aria-expanded="true"] .tl-toggle-hint { color: #1448FF; }

  .tl-chevron {
    display: block; flex-shrink: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tl-card[aria-expanded="true"] .tl-chevron { transform: rotate(180deg); }

  /* Detail — fixed max-height keeps all expanded cards equal */
  .tl-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .tl-detail.tl-open { max-height: 300px; }

  .tl-detail-inner {
    border-top: 1px solid #C1B5FF;
    padding: 0.8rem 1rem 1.1rem;
    min-height: 220px;
  }

  .tl-strong-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #836BFF;
    margin-bottom: 0.55rem;
  }
  .tl-card.tl-current .tl-strong-label { color: #1448FF; }

  .tl-detail ul { list-style: none; padding: 0; margin: 0; }
  .tl-detail ul li {
    font-size: 0.77rem;
    color: #140F50;
    line-height: 1.55;
    margin-bottom: 0.38rem;
    padding-left: 1.15rem;
    position: relative;
  }
  .tl-detail ul li::before {
    content: "\2713";
    color: #836BFF;
    font-weight: 700;
    position: absolute;
    left: 0; top: 0;
  }
  .tl-card.tl-current .tl-detail ul li::before { color: #1448FF; }

  @keyframes tlGlow {
    0%   { box-shadow: 0 4px 20px rgba(131,107,255,0); }
    45%  { box-shadow: 0 6px 36px rgba(131,107,255,0.35); }
    100% { box-shadow: 0 6px 24px rgba(131,107,255,0.2); }
  }
  @keyframes tlArrowPulse {
    0%, 100% { opacity: 0.65; }
    50%       { opacity: 1; }
  }

  @media (max-width: 600px) {
    body { padding: 1rem 0.85rem 1.5rem; }
    .tl-card { width: 188px; }
    .tl-detail.tl-open { max-height: 300px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>

<p class="tl-hint" aria-hidden="true">
  <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
    <path d="M2 7.5h10M9 4l3.5 3.5L9 11" stroke="#9884FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Scroll to see all 6 stages &mdash; click any stage to reveal the indicators
</p>

<div class="tl-track" id="tlTrack" role="list" aria-label="Project approach stages"></div>

<script>
(function () {
  var activeStage = 5;

  var steps = [
    {
      icon: "\uD83D\uDD0D", title: "Define the Problem", week: "Week 4",
      desc: "Start by understanding what the problem really is \u2014 not just what it looks like on the surface.",
      strong: [
        "You can explain the problem clearly to someone unfamiliar with it",
        "You\u2019ve looked at root causes, not just symptoms",
        "You\u2019ve gathered evidence, research, or observations to support your understanding",
        "You know who is affected and why the problem hasn\u2019t already been solved",
        "You\u2019ve thought about what makes this problem difficult or worth addressing",
        "You\u2019ve discussed as a group how AI will be used in this project \u2014 and where you\u2019ll draw the line"
      ]
    },
    {
      icon: "\uD83D\uDC65", title: "Understand Stakeholders", week: "Week 5",
      desc: "Think carefully about who is involved, who is affected, and whose needs might conflict.",
      strong: [
        "You\u2019ve identified more than just the most obvious stakeholders",
        "You\u2019ve considered where needs might conflict or compete",
        "You can explain what each group cares about and why",
        "You\u2019ve thought about who has power to change things and who doesn\u2019t",
        "You\u2019ve considered perspectives that might be easy to overlook"
      ]
    },
    {
      icon: "\u270F\uFE0F", title: "Design Your Approach", week: "Week 6",
      desc: "Develop a response that is realistic, specific, and connected to what you\u2019ve learned.",
      strong: [
        "Your idea connects clearly to the problem you defined",
        "You can explain how it would work in practice",
        "You\u2019ve thought about what it would realistically take to implement",
        "You\u2019ve made deliberate design choices rather than going with the first idea",
        "Your approach reflects the constraints and trade-offs you\u2019ve identified",
        "You\u2019ve agreed on team roles and can explain who is responsible for what"
      ]
    },
    {
      icon: "\u2696\uFE0F", title: "Consider Risks and Constraints", week: "Week 7",
      desc: "Think honestly about what could go wrong, what limits you, and what trade-offs are required.",
      strong: [
        "You\u2019ve identified specific risks \u2014 not just general ones",
        "You can explain ethical issues that relate directly to your project",
        "You\u2019ve acknowledged what you\u2019d have to give up or compromise",
        "You\u2019ve thought about unintended consequences for different groups",
        "You\u2019ve considered feasibility, cost, and what could fail",
        "You\u2019ve thought about AI-specific risks \u2014 such as over-reliance, bias in outputs, or unequal workload"
      ]
    },
    {
      icon: "\uD83E\uDD16", title: "Use AI Thoughtfully", week: "Week 8",
      desc: "Be intentional and transparent about where AI helps \u2014 and where your own judgment matters more.",
      strong: [
        "You can explain what AI was used for and why at each stage",
        "You\u2019ve maintained critical judgment rather than accepting AI output uncritically",
        "You\u2019ve noted where AI had limitations or where you had to revise what it produced",
        "Your work reflects your thinking, not just AI-generated content",
        "You\u2019ve been honest about where the boundaries of your AI use sit"
      ]
    },
    {
      icon: "\uD83D\uDD04", title: "Reflect and Refine", week: "Weeks 9\u201310",
      desc: "Look back at how your thinking developed and what changed as you worked through the project.",
      strong: [
        "You can explain how your understanding of the problem shifted over time",
        "You\u2019ve noted what feedback or iteration changed in your design",
        "Your reflection is honest \u2014 including what didn\u2019t work",
        "You\u2019ve connected your learning to the bigger picture of the project",
        "You can explain what you would do differently with more time or resources",
        "You can clearly describe your own individual contribution \u2014 not just what the group did, but what you specifically did and learned"
      ]
    }
  ];

  var track = document.getElementById('tlTrack');
  if (!track) return;
  var connectors = [];

  function showItems(detail) {
    var items = detail.querySelectorAll('li');
    items.forEach(function (item, idx) {
      item.style.transition = 'none';
      item.style.opacity = '0';
      item.style.transform = 'translateY(10px)';
      setTimeout(function () {
        item.style.transition = 'opacity 0.32s ease ' + (0.08 + idx * 0.07) + 's, transform 0.32s ease ' + (0.08 + idx * 0.07) + 's';
        item.style.opacity = '1';
        item.style.transform = 'translateY(0)';
      }, 20);
    });
  }

  function hideItems(detail) {
    detail.querySelectorAll('li').forEach(function (item) {
      item.style.transition = 'none';
      item.style.opacity = '0';
      item.style.transform = 'translateY(10px)';
    });
  }

  steps.forEach(function (step, i) {
    if (i > 0) {
      var conn = document.createElement('div');
      conn.className = 'tl-connector';
      conn.setAttribute('aria-hidden', 'true');
      conn.innerHTML = '<svg width="40" height="30" viewBox="0 0 40 30" fill="none"><path d="M2 15h30M24 6l10 9-10 9" stroke="#C1B5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      connectors.push(conn);
      track.appendChild(conn);
    }

    var wrap = document.createElement('div');
    wrap.className = 'tl-step-wrap';
    wrap.setAttribute('role', 'listitem');

    var detailId = 'tl-detail-' + i;
    var isCurrent = (i === activeStage);

    var card = document.createElement('div');
    card.className = 'tl-card' + (isCurrent ? ' tl-current' : '');
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-expanded', 'false');
    card.setAttribute('aria-controls', detailId);
    card.setAttribute('aria-label', 'Stage ' + (i + 1) + ': ' + step.title);

    var badgeText = isCurrent
      ? 'During \u00B7 ' + step.week + ' \u00B7 You\u2019re here'
      : 'During \u00B7 ' + step.week;

    var hintText = isCurrent ? 'See what strong work looks like' : 'What strong work looks like';

    card.innerHTML =
      '<div class="tl-week-badge">\uD83D\uDCC5 ' + badgeText + '</div>' +
      '<div class="tl-card-body">' +
        '<div class="tl-card-top">' +
          '<span class="tl-num" aria-hidden="true">' + (i + 1) + '</span>' +
          '<span class="tl-icon" aria-hidden="true">' + step.icon + '</span>' +
        '</div>' +
        '<div class="tl-title">' + step.title + '</div>' +
        '<p class="tl-desc">' + step.desc + '</p>' +
        '<div class="tl-toggle-hint" aria-hidden="true">' +
          hintText +
          '<svg class="tl-chevron" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 4.5l4.5 4.5 4.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
      '</div>' +
      '<div class="tl-detail" id="' + detailId + '" role="region" aria-label="Strong work indicators for stage ' + (i + 1) + '">' +
        '<div class="tl-detail-inner">' +
          '<div class="tl-strong-label">What strong work looks like</div>' +
          '<ul>' + step.strong.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ul>' +
        '</div>' +
      '</div>';

    function toggle() {
      var detail = document.getElementById(detailId);
      var expanded = card.getAttribute('aria-expanded') === 'true';
      if (expanded) {
        card.setAttribute('aria-expanded', 'false');
        detail.classList.remove('tl-open');
        hideItems(detail);
        if (i > 0) connectors[i - 1].classList.remove('tl-adj');
        if (i < steps.length - 1) connectors[i].classList.remove('tl-adj');
      } else {
        card.setAttribute('aria-expanded', 'true');
        card.classList.remove('tl-glow');
        void card.offsetWidth;
        card.classList.add('tl-glow');
        detail.classList.add('tl-open');
        showItems(detail);
        if (i > 0) connectors[i - 1].classList.add('tl-adj');
        if (i < steps.length - 1) connectors[i].classList.add('tl-adj');
      }
      notifyParent();
    }

    card.addEventListener('click', toggle);
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });

    wrap.appendChild(card);
    track.appendChild(wrap);
  });

  function notifyParent() {
    setTimeout(function () {
      try { window.parent.postMessage({ type: 'tlResize', height: document.documentElement.scrollHeight }, '*'); } catch (e) {}
    }, 420);
  }
  window.addEventListener('load', notifyParent);
})();
</script>
</body>
</html>
