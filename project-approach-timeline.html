<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>How To Approach Any Project</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffffff;
    color: #2d2a3e;
    padding: 1.5rem 1.25rem 2rem;
    min-height: 100vh;
  }

  .tl-heading {
    font-family: 'Georgia', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: #6956cc;
    margin-bottom: 0.3rem;
  }

  .tl-subtext {
    font-size: 0.82rem;
    color: #6b6784;
    line-height: 1.5;
    margin-bottom: 1.1rem;
  }

  .tl-hint {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: #9e99bb;
    margin-bottom: 0.85rem;
    user-select: none;
  }

  /* ── Track ── */
  .tl-track {
    display: flex;
    align-items: flex-start;
    overflow-x: auto;
    padding: 0.25rem 0.1rem 1.5rem;
    gap: 0;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #cfc9f0 #f4f2ff;
  }
  .tl-track::-webkit-scrollbar { height: 5px; }
  .tl-track::-webkit-scrollbar-track { background: #f4f2ff; border-radius: 3px; }
  .tl-track::-webkit-scrollbar-thumb { background: #cfc9f0; border-radius: 3px; }

  /* ── Connector ── */
  .tl-connector {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 3px;
    margin-top: 34px;
  }

  /* ── Card ── */
  .tl-step-wrap {
    display: flex;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .tl-card {
    width: 218px;
    background: #ffffff;
    border: 1.5px solid #d8dbe8;
    border-radius: 12px;
    padding: 1.05rem 1rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    outline: none;
    text-align: left;
  }
  .tl-card:hover {
    border-color: #b0a6e8;
    box-shadow: 0 3px 14px rgba(105,86,204,0.11);
  }
  .tl-card:focus-visible {
    border-color: #6956cc;
    box-shadow: 0 0 0 3px rgba(105,86,204,0.22);
  }
  .tl-card[aria-expanded="true"] {
    border-color: #6956cc;
    background: #f9f8ff;
    box-shadow: 0 4px 20px rgba(105,86,204,0.13);
  }

  .tl-card-top {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    margin-bottom: 0.6rem;
  }

  .tl-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: #6956cc;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    line-height: 1;
    transition: background 0.2s;
  }
  .tl-card[aria-expanded="true"] .tl-num { background: #5244a8; }

  .tl-icon { font-size: 1.2rem; line-height: 1; }

  .tl-title {
    font-family: 'Georgia', serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: #2d2a3e;
    margin: 0 0 0.38rem;
    line-height: 1.35;
    transition: color 0.2s;
  }
  .tl-card[aria-expanded="true"] .tl-title { color: #6956cc; }

  .tl-desc {
    font-size: 0.79rem;
    color: #5c5875;
    line-height: 1.55;
    margin: 0 0 0.6rem;
  }

  .tl-toggle-hint {
    font-size: 0.73rem;
    color: #b0a6d8;
    display: flex;
    align-items: center;
    gap: 0.28rem;
    transition: color 0.2s;
  }
  .tl-card:hover .tl-toggle-hint,
  .tl-card[aria-expanded="true"] .tl-toggle-hint { color: #6956cc; }

  .tl-chevron {
    display: block;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .tl-card[aria-expanded="true"] .tl-chevron { transform: rotate(180deg); }

  /* ── Expanded detail ── */
  .tl-detail {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.38s ease, opacity 0.3s ease;
  }
  .tl-detail.tl-open {
    max-height: 700px;
    opacity: 1;
  }

  .tl-detail-inner {
    border-top: 1px solid #e6e2f8;
    margin-top: 0.7rem;
    padding-top: 0.75rem;
  }

  .tl-strong-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6956cc;
    margin-bottom: 0.5rem;
  }

  .tl-detail ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .tl-detail ul li {
    font-size: 0.77rem;
    color: #3d3a52;
    line-height: 1.55;
    margin-bottom: 0.38rem;
    padding-left: 1.15rem;
    position: relative;
  }
  .tl-detail ul li::before {
    content: "\2713";
    color: #6956cc;
    font-weight: 700;
    position: absolute;
    left: 0;
    top: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    body { padding: 1rem 0.9rem 1.5rem; }
    .tl-card { width: 188px; }
  }
</style>
</head>
<body>

<p class="tl-heading">How To Approach Any Project</p>
<p class="tl-subtext">Most successful projects move through a similar sequence. Select any stage to see what strong work looks like at that point.</p>

<p class="tl-hint" aria-hidden="true">
  <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
    <path d="M2 7.5h10M9 4l3.5 3.5L9 11" stroke="#b0a6d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Scroll to see all 6 stages
</p>

<div class="tl-track" id="tlTrack" role="list" aria-label="Project approach stages"></div>

<script>
(function () {
  var steps = [
    {
      icon: "\uD83D\uDD0D",
      title: "Define the Problem",
      desc: "Start by understanding what the problem really is \u2014 not just what it looks like on the surface.",
      strong: [
        "You can explain the problem clearly to someone unfamiliar with it",
        "You\u2019ve looked at root causes, not just symptoms",
        "You\u2019ve gathered evidence, research, or observations to support your understanding",
        "You know who is affected and why the problem hasn\u2019t already been solved",
        "You\u2019ve thought about what makes this problem difficult or worth addressing"
      ]
    },
    {
      icon: "\uD83D\uDC65",
      title: "Understand Stakeholders",
      desc: "Think carefully about who is involved, who is affected, and whose needs might conflict.",
      strong: [
        "You\u2019ve identified more than just the most obvious stakeholders",
        "You\u2019ve considered where needs might conflict or compete",
        "You can explain what each group cares about and why",
        "You\u2019ve thought about who has power to change things and who doesn\u2019t",
        "You\u2019ve considered perspectives that might be easy to overlook"
      ]
    },
    {
      icon: "\u270F\uFE0F",
      title: "Design Your Approach",
      desc: "Develop a response that is realistic, specific, and connected to what you\u2019ve learned.",
      strong: [
        "Your idea connects clearly to the problem you defined",
        "You can explain how it would work in practice",
        "You\u2019ve thought about what it would realistically take to implement",
        "You\u2019ve made deliberate design choices rather than going with the first idea",
        "Your approach reflects the constraints and trade-offs you\u2019ve identified"
      ]
    },
    {
      icon: "\u2696\uFE0F",
      title: "Consider Risks and Constraints",
      desc: "Think honestly about what could go wrong, what limits you, and what trade-offs are required.",
      strong: [
        "You\u2019ve identified specific risks \u2014 not just general ones",
        "You can explain ethical issues that relate directly to your project",
        "You\u2019ve acknowledged what you\u2019d have to give up or compromise",
        "You\u2019ve thought about unintended consequences for different groups",
        "You\u2019ve considered feasibility, cost, and what could fail"
      ]
    },
    {
      icon: "\uD83E\uDD16",
      title: "Use AI Thoughtfully",
      desc: "Be intentional and transparent about where AI helps \u2014 and where your own judgment matters more.",
      strong: [
        "You can explain what AI was used for and why at each stage",
        "You\u2019ve maintained critical judgment rather than accepting AI output uncritically",
        "You\u2019ve noted where AI had limitations or where you had to revise what it produced",
        "Your work reflects your thinking, not just AI-generated content",
        "You\u2019ve been honest about where the boundaries of your AI use sit"
      ]
    },
    {
      icon: "\uD83D\uDD04",
      title: "Reflect and Refine",
      desc: "Look back at how your thinking developed and what changed as you worked through the project.",
      strong: [
        "You can explain how your understanding of the problem shifted over time",
        "You\u2019ve noted what feedback or iteration changed in your design",
        "Your reflection is honest \u2014 including what didn\u2019t work",
        "You\u2019ve connected your learning to the bigger picture of the project",
        "You can explain what you would do differently with more time or resources"
      ]
    }
  ];

  var track = document.getElementById('tlTrack');
  if (!track) return;

  steps.forEach(function (step, i) {
    if (i > 0) {
      var conn = document.createElement('div');
      conn.className = 'tl-connector';
      conn.setAttribute('aria-hidden', 'true');
      conn.innerHTML = '<svg width="22" height="16" viewBox="0 0 22 16" fill="none"><path d="M1 8h17M14 4l4 4-4 4" stroke="#cfc9f0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      track.appendChild(conn);
    }

    var wrap = document.createElement('div');
    wrap.className = 'tl-step-wrap';
    wrap.setAttribute('role', 'listitem');

    var detailId = 'tl-detail-' + i;

    var card = document.createElement('div');
    card.className = 'tl-card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-expanded', 'false');
    card.setAttribute('aria-controls', detailId);
    card.setAttribute('aria-label', 'Stage ' + (i + 1) + ': ' + step.title);

    card.innerHTML =
      '<div class="tl-card-top">' +
        '<span class="tl-num" aria-hidden="true">' + (i + 1) + '</span>' +
        '<span class="tl-icon" aria-hidden="true">' + step.icon + '</span>' +
      '</div>' +
      '<div class="tl-title">' + step.title + '</div>' +
      '<p class="tl-desc">' + step.desc + '</p>' +
      '<div class="tl-toggle-hint" aria-hidden="true">' +
        'What strong work looks like' +
        '<svg class="tl-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</div>' +
      '<div class="tl-detail" id="' + detailId + '" role="region" aria-label="Strong work at stage ' + (i + 1) + ': ' + step.title + '">' +
        '<div class="tl-detail-inner">' +
          '<div class="tl-strong-label">What strong work looks like</div>' +
          '<ul>' + step.strong.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ul>' +
        '</div>' +
      '</div>';

    function toggle() {
      var detail = document.getElementById(detailId);
      var expanded = card.getAttribute('aria-expanded') === 'true';
      if (expanded) {
        card.setAttribute('aria-expanded', 'false');
        detail.classList.remove('tl-open');
      } else {
        card.setAttribute('aria-expanded', 'true');
        detail.classList.add('tl-open');
      }
    }

    card.addEventListener('click', toggle);
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggle();
      }
    });

    wrap.appendChild(card);
    track.appendChild(wrap);
  });
})();
</script>

</body>
</html>
