<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project timeline — Week 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital@0;1&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffffff;
    color: #333;
    padding: 1.1rem 1rem 2rem;
  }

  .tl-hint {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.77rem;
    color: #aaa;
    margin-bottom: 0.9rem;
    user-select: none;
  }

  .tl-track {
    display: flex;
    align-items: flex-start;
    overflow-x: auto;
    padding: 0.25rem 0.1rem 1.5rem;
    gap: 0;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #c0c0c0 #f0f0f0;
  }
  .tl-track::-webkit-scrollbar { height: 5px; }
  .tl-track::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 3px; }
  .tl-track::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }

  .tl-connector {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 4px;
    margin-top: 3.2rem;
  }

  .tl-step-wrap { flex-shrink: 0; }

  .tl-card {
    width: 210px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    cursor: pointer;
    outline: none;
    text-align: left;
    transition: box-shadow 0.22s ease, transform 0.2s ease;
  }
  .tl-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.13); }
  .tl-card:focus-visible { box-shadow: 0 0 0 3px rgba(131,107,255,0.35); }

  .tl-card-head { padding: 0.65rem 0.9rem 0.55rem; }
  .tl-week-label {
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    flex-wrap: wrap;
  }
  .tl-phase-pill {
    display: inline-block;
    border-radius: 20px;
    padding: 0.25rem 0.85rem;
    font-size: 0.8rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .tl-you-here {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 0.2rem;
  }

  .tl-card-body {
    padding: 0.75rem 0.9rem 0;
    display: flex;
    flex-direction: column;
  }
  .tl-title {
    font-family: 'Roboto Serif', Georgia, serif;
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 0.35rem;
  }
  .tl-question {
    font-size: 0.77rem;
    line-height: 1.55;
    margin: 0;
    flex: 1;
  }
  .tl-toggle-hint {
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 0.28rem;
    padding: 0.5rem 0 0.8rem;
    margin-top: auto;
    white-space: nowrap;
    transition: color 0.2s ease;
  }
  .tl-chevron {
    display: block;
    flex-shrink: 0;
    transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tl-card[aria-expanded="true"] .tl-chevron { transform: rotate(180deg); }

  .tl-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1);
  }
  .tl-detail.tl-open { max-height: 620px; }

  .tl-detail-inner { padding: 0.7rem 0.9rem 1rem; }
  .tl-strong-label {
    font-size: 0.67rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.5rem;
  }
  .tl-detail ul { list-style: none; padding: 0; margin: 0; }
  .tl-detail ul li {
    font-size: 0.76rem;
    line-height: 1.52;
    margin-bottom: 0.36rem;
    padding-left: 1.1rem;
    position: relative;
  }
  .tl-detail ul li::before {
    content: "\2713";
    font-weight: 700;
    position: absolute;
    left: 0; top: 0;
  }

  /* active */
  .tl-card.is-active { border: 2px solid #006B75; box-shadow: 0 4px 16px rgba(0,107,117,0.18); }
  .tl-card.is-active .tl-card-head { background: #006B75; }
  .tl-card.is-active .tl-week-label { color: #ffffff; }
  .tl-card.is-active .tl-phase-pill { background-color: #006B75; color: #ffffff; border: 1.5px solid rgba(255,255,255,0.4); }
  .tl-card.is-active .tl-card-body { background: #f0faf9; }
  .tl-card.is-active .tl-title { color: #006B75; }
  .tl-card.is-active .tl-question { color: #2a2a2a; }
  .tl-card.is-active .tl-toggle-hint { color: #006B75; }
  .tl-card.is-active .tl-detail-inner { background: #f0faf9; border-top: 1px solid #b2dde0; }
  .tl-card.is-active .tl-strong-label { color: #006B75; }
  .tl-card.is-active .tl-detail ul li { color: #2a2a2a; }
  .tl-card.is-active .tl-detail ul li::before { color: #006B75; }

  /* done */
  .tl-card.is-done { border: 1px solid #d8dbe8; }
  .tl-card.is-done .tl-card-head { background: #eae6f7; }
  .tl-card.is-done .tl-week-label { color: #6956cc; }
  .tl-card.is-done .tl-phase-pill { background-color: #eae6f7; color: #6956cc; }
  .tl-card.is-done .tl-card-body { background: #ffffff; }
  .tl-card.is-done .tl-title { color: #6956cc; }
  .tl-card.is-done .tl-question { color: #333; }
  .tl-card.is-done .tl-toggle-hint { color: #836BFF; }
  .tl-card.is-done .tl-detail-inner { background: #ffffff; border-top: 1px solid #e2ddf5; }
  .tl-card.is-done .tl-strong-label { color: #6956cc; }
  .tl-card.is-done .tl-detail ul li { color: #333; }
  .tl-card.is-done .tl-detail ul li::before { color: #836BFF; }

  /* future */
  .tl-card.is-future { border: 1px solid #e8e8e8; }
  .tl-card.is-future .tl-card-head { background: #f3f3f6; }
  .tl-card.is-future .tl-week-label { color: #aaa; }
  .tl-card.is-future .tl-phase-pill { background-color: #f3f3f6; color: #aaa; }
  .tl-card.is-future .tl-card-body { background: #ffffff; }
  .tl-card.is-future .tl-title { color: #aaa; }
  .tl-card.is-future .tl-question { color: #aaa; }
  .tl-card.is-future .tl-toggle-hint { color: #c8c8c8; }
  .tl-card.is-future .tl-detail-inner { background: #ffffff; border-top: 1px solid #e8e8e8; }
  .tl-card.is-future .tl-strong-label { color: #bbb; }
  .tl-card.is-future .tl-detail ul li { color: #bbb; }
  .tl-card.is-future .tl-detail ul li::before { color: #ccc; }

  @media (max-width: 600px) {
    body { padding: 0.9rem 0.75rem 1.5rem; }
    .tl-card { width: 185px; }
    .tl-detail.tl-open { max-height: 520px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>

<p class="tl-hint" aria-hidden="true">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M1.5 7h9M7.5 3.5l3.5 3.5-3.5 3.5" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Scroll to see all weeks — click any card to expand the detail
</p>

<div class="tl-track" id="tlTrack" role="list" aria-label="Project timeline weeks 4 to 10"></div>

<script>
(function () {
  var ACTIVE_WEEK = 4;

  var weeks = [
    {
      week: 4,
      phase: "Empathising",
      question: "What problem space are we working in, and what ideas does our group want to explore?",
      strong: [
        "The group has arrived with individual ideas and brainstormed openly without filtering",
        "A project direction has been chosen and can be described clearly in one sentence",
        "Roles and responsibilities have been discussed, even if not yet finalised",
        "The group can articulate what AI will do in the project, not just that it will be used",
        "A first portfolio entry has been started documenting the project description and individual role"
      ]
    },
    {
      week: 5,
      phase: "Defining",
      question: "Who is affected by this problem, and what do they actually need?",
      strong: [
        "The group has identified at least four distinct stakeholders with specific needs and interests",
        "Stakeholder needs have been mapped against each other: conflicts and alignments are noted",
        "The group can state the problem they are solving in one clear sentence that refers to real people",
        "AI use has been considered in relation to stakeholder needs, not just technical capability",
        "The ePortfolio includes the stakeholder map and a reflection on what the analysis revealed"
      ]
    },
    {
      week: 6,
      phase: "Ideating",
      question: "What are the different ways we could approach this, and which holds up under constraint?",
      strong: [
        "The group has generated at least two distinct approaches, not just variations on one idea",
        "Each approach has been assessed against real constraints: time, skills, data access, ethics",
        "A single approach has been selected with a clear rationale, not just preference",
        "The group understands what is being sacrificed with the chosen approach and has documented it",
        "The ePortfolio includes the ideation notes and the decision rationale"
      ]
    },
    {
      week: 7,
      phase: "Prototyping",
      question: "What is the simplest version of our solution we can make, show, and learn from?",
      strong: [
        "The group has produced something tangible: a sketch, output, mockup, storyboard, or draft",
        "The prototype is specific enough that someone outside the group can understand what it is trying to do",
        "AI was used in the creation of the prototype and its role is documented",
        "The group has noted what the prototype does not yet do: limitations are acknowledged honestly",
        "The ePortfolio includes the prototype artefact and a reflection on decisions made"
      ]
    },
    {
      week: 8,
      phase: "Testing",
      question: "What did we learn from testing, and how does that change what we have built?",
      strong: [
        "The group received and documented peer feedback on their prototype",
        "Specific refinements were made in response to feedback, with reasons noted",
        "Limitations that cannot be fixed have been acknowledged and explained honestly",
        "The group can articulate what they would do differently if they started again",
        "The poster tells the full project story from Empathise through to Test, including AI use"
      ]
    },
    {
      week: 9,
      phase: "Reflecting and Refining",
      question: "How has our thinking developed, and what would we do differently if we had more time or resources?",
      strong: [
        "You can explain how your understanding of the problem shifted from Empathise through to Test",
        "You’ve noted what feedback or iteration changed in your design decisions",
        "Your reflection is honest: including what didn’t work and why",
        "You’ve connected your learning to the bigger picture of the project and your individual role in it",
        "You can explain what you would do differently with more time or resources, including potential implementation steps",
        "You can clearly describe your own individual contribution: not just what the group did, but what you specifically did and learned"
      ]
    }
  ];

  var track = document.getElementById('tlTrack');
  if (!track) return;

  weeks.forEach(function (w, i) {
    if (i > 0) {
      var conn = document.createElement('div');
      conn.className = 'tl-connector';
      conn.setAttribute('aria-hidden', 'true');
      conn.innerHTML = '<svg width="32" height="22" viewBox="0 0 32 22" fill="none"><path d="M1 11h24M18 4l8 7-8 7" stroke="#c0c0c0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      track.appendChild(conn);
    }

    var wrap = document.createElement('div');
    wrap.className = 'tl-step-wrap';
    wrap.setAttribute('role', 'listitem');

    var detailId = 'tl-detail-' + w.week;
    var state = w.week === ACTIVE_WEEK ? 'is-active' : (w.week < ACTIVE_WEEK ? 'is-done' : 'is-future');
    var isActive = w.week === ACTIVE_WEEK;
    var startOpen = isActive;
    var weekLabel = w.week === 9 ? 'Weeks 9–10' : 'Week ' + w.week;

    var card = document.createElement('div');
    card.className = 'tl-card ' + state;
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-expanded', startOpen ? 'true' : 'false');
    card.setAttribute('aria-controls', detailId);
    card.setAttribute('aria-label', weekLabel + ': ' + w.phase);

    var headHTML =
      '<div class="tl-card-head">' +
        '<div class="tl-week-label">' +
          weekLabel +
          '<span class="tl-phase-pill">' + w.phase + '</span>' +
        '</div>' +
        (isActive ? '<div class="tl-you-here">You are here</div>' : '') +
      '</div>';

    var bodyHTML =
      '<div class="tl-card-body">' +
        '<div class="tl-title">' + weekLabel + ' · ' + w.phase + '</div>' +
        '<p class="tl-question">' + w.question + '</p>' +
        '<div class="tl-toggle-hint" aria-hidden="true">' +
          'What strong work looks like' +
          '<svg class="tl-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
      '</div>';

    var detailHTML =
      '<div class="tl-detail' + (startOpen ? ' tl-open' : '') + '" id="' + detailId + '" role="region" aria-label="What strong work looks like in ' + weekLabel + '">' +
        '<div class="tl-detail-inner">' +
          '<div class="tl-strong-label">What strong work looks like</div>' +
          '<ul>' + w.strong.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ul>' +
        '</div>' +
      '</div>';

    card.innerHTML = headHTML + bodyHTML + detailHTML;

    card.addEventListener('click', toggle);
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });

    function toggle() {
      var detail = document.getElementById(detailId);
      var expanded = card.getAttribute('aria-expanded') === 'true';
      if (expanded) {
        card.setAttribute('aria-expanded', 'false');
        detail.classList.remove('tl-open');
      } else {
        card.setAttribute('aria-expanded', 'true');
        detail.classList.add('tl-open');
      }
      notifyParent();
    }

    wrap.appendChild(card);
    track.appendChild(wrap);
  });

  var activeCard = track.querySelector('.is-active');
  if (activeCard) {
    setTimeout(function () {
      activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }, 80);
  }

  function notifyParent() {
    setTimeout(function () {
      try { window.parent.postMessage({ type: 'tlResize', height: document.documentElement.scrollHeight }, '*'); } catch (e) {}
    }, 420);
  }
  window.addEventListener('load', notifyParent);
})();
</script>
</body>
</html>
